<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — immo6.com</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a2e;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #f5f5f5;
        padding: 1rem;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        color: #ffd60a;
        letter-spacing: 1px;
      }
      a.back {
        position: absolute;
        top: 1rem;
        left: 1rem;
        color: #ffd60a;
        text-decoration: none;
        font-size: 0.95rem;
      }
      a.back:hover {
        text-decoration: underline;
      }
      form {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.25rem;
        color: #ccc;
        font-size: 0.9rem;
      }
      input, textarea {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 1px solid #444;
        border-radius: 6px;
        background: #16213e;
        color: #f5f5f5;
        font-family: inherit;
        font-size: 1rem;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: #ffd60a;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        padding: 0.75rem 1.5rem;
        background: #ffd60a;
        color: #1a1a2e;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      button:hover {
        filter: brightness(1.1);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 6px;
        text-align: center;
        font-size: 0.95rem;
        display: none;
      }
      .message.success {
        display: block;
        background: rgba(0, 180, 100, 0.2);
        color: #4ade80;
        border: 1px solid #4ade80;
      }
      .message.error {
        display: block;
        background: rgba(220, 50, 50, 0.2);
        color: #f87171;
        border: 1px solid #f87171;
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">← Retour</a>
    <h1>Nous contacter</h1>
    <!-- Remplace l'URL ci-dessous par l'URL de ton déploiement Google Apps Script -->
    <form id="contact-form" action="REMPLACER_PAR_URL_DU_SCRIPT" method="POST">
      <div>
        <label for="name">Nom *</label>
        <input type="text" id="name" name="from_name" required placeholder="Votre nom">
      </div>
      <div>
        <label for="email">Email *</label>
        <input type="email" id="email" name="from_email" required placeholder="votre@email.com">
      </div>
      <div>
        <label for="subject">Objet *</label>
        <input type="text" id="subject" name="subject" required placeholder="Objet du message">
      </div>
      <div>
        <label for="msg">Message *</label>
        <textarea id="msg" name="message" required placeholder="Votre message"></textarea>
      </div>
      <button type="submit" id="submit-btn">Envoyer</button>
    </form>
    <div id="form-message" class="message" role="alert"></div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var msgEl = document.getElementById('form-message');
        if (params.get('sent') === '1') {
          msgEl.textContent = 'Message envoyé. Nous vous recontacterons rapidement.';
          msgEl.className = 'message success';
          msgEl.style.display = 'block';
          history.replaceState({}, '', 'contact.html');
        } else if (params.get('error') === '1') {
          msgEl.textContent = 'Erreur d\'envoi. Réessayez ou écrivez à serge@immo6.com.';
          msgEl.className = 'message error';
          msgEl.style.display = 'block';
          history.replaceState({}, '', 'contact.html');
        }
      })();
    </script>
  </body>
</html>
