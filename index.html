<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo6 – solution digitale pour les professionnels de l’immobilier</title>
    <meta name="description" content="Immo6 – solution digitale pour les professionnels de l’immobilier. Site en construction.">
    <meta property="og:title" content="Immo6 – solution digitale pour les professionnels de l’immobilier">
    <meta property="og:description" content="Immo6 – solution digitale pour les professionnels de l’immobilier. Site en construction.">
    <meta property="og:image" content="https://immo6.com/images/logo.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Immo6",
      "url": "https://immo6.com",
      "logo": "https://immo6.com/images/logo.png"
    }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a2e;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #f5f5f5;
      }
      .logo {
        width: 160px;
        height: auto;
        margin-bottom: 1.25rem;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: #ffd60a;
        letter-spacing: 1px;
      }
      p {
        font-size: 1.1rem;
        color: #ccc;
      }
      .construction {
        text-decoration: underline;
        color: #fff;
      }
      #countdown {
        margin-top: 1.5rem;
        font-size: 1.5rem;
        font-variant-numeric: tabular-nums;
        color: #ffd60a;
        letter-spacing: 2px;
      }
      #countdown span {
        color: #ccc;
        font-size: 0.9rem;
        font-weight: normal;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <img src="images/logo.png" alt="Immo6 – solution digitale pour les professionnels de l’immobilier" class="logo">
    <p class="construction">Site en <strong>construction</strong>.</p>
    <div id="countdown"><span>Ouverture dans :</span><br> <span id="timer">459 h 45 min 00 s</span></div>
    <script>
      (function () {
        var totalSeconds = 459 * 3600 + 45 * 60;
        function format(t) {
          var h = Math.floor(t / 3600);
          var m = Math.floor((t % 3600) / 60);
          var s = t % 60;
          return h + ' h ' + String(m).padStart(2, '0') + ' min ' + String(s).padStart(2, '0') + ' s';
        }
        var el = document.getElementById('timer');
        el.textContent = format(totalSeconds);
        setInterval(function () {
          if (totalSeconds <= 0) return;
          totalSeconds--;
          el.textContent = format(totalSeconds);
        }, 1000);
      })();
    </script>
  </body>
</html>
